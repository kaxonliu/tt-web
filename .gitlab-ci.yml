stages:
  - test
  - build-image
  - deploy

variables:
  # 镜像仓库配置（使用 GitLab 自带的 Container Registry）
  CI_REGISTRY: 192.168.43.80:30002
  CI_REGISTRY_IMAGE: ${CI_REGISTRY}/pythonwebproject/tt-web  # 完整镜像名: 仓库地址/项目路径
  IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}         # 使用 commit short SHA 作为镜像标签
  # 部署相关
  K8S_NAMESPACE: default          # 替换为你的命名空间
  DEPLOYMENT_NAME: hello-flask              # 替换为你的 Deployment 名称

# 缓存 Python 依赖（可选，加快 test 阶段）
cache:
  paths:
    - .venv/        # 如果你使用虚拟环境
    - ~/.cache/pip  # pip 缓存

# ========== 1. 测试阶段 ==========
test:
  stage: test
  image: python:3.11-slim
  script:
    - echo "测试阶段"

# ========== 2. 构建并推送镜像（使用 Kaniko）==========
build-image:
  stage: build-image
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    # Kaniko 自动读取 docker 配置并推送镜像
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${IMAGE_TAG}"
      --destination "${CI_REGISTRY_IMAGE}:latest"
      --cache=true     
      --username "${HARBOR_USERNAME}"
      --password "${HARBOR_PASSWORD}"
  only:
    - main
  # 如果需要推送至私有仓库，可配置 docker config 作为 secret
  # 但对于 GitLab Container Registry，Kaniko 会自动使用 CI Job 的 Token
  # 如果你的 Runner 在 K8s 中运行，需要确保有权限写入 /kaniko/.docker/config.json
  # 一般情况下不需要额外配置

# ========== 3. 部署到 Kubernetes ==========
deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    # kubectl 会自动使用环境变量 KUBECONFIG 指向的配置文件
    - sed -i 's/IMAGE_TAG/${IMAGE_TAG}/g' ./k8s/prod.yaml
    - kubectl apply -f k8s/prod.yaml -n ${K8S_NAMESPACE}
    - kubectl rollout status deployment/${DEPLOYMENT_NAME} -n ${K8S_NAMESPACE}
  only:
    - main